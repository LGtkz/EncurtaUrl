<div class="alias-input">
  <span class="alias-prefix">Aesthetic/</span>
  <input id="alias" type="text" placeholder="meu-link">
</div>

<script>
const API_URL = 'https://9e32-2804-14d-a484-4e33-708a-8f47-411b-afdf.ngrok-free.app';
let links = [];

function isValidUrl(v){
  try{ new URL(v.match(/^https?:\/\//) ? v : 'https://'+v); return true; }catch{ return false; }
}

// Carrega os links do banco assim que abrir a aplicação
async function carregarLinks() {
  try {
    const response = await fetch(`${API_URL}/links`);
    if (response.ok) {
      links = await response.json();
      render();
    }
  } catch (err) {
    console.error('Erro ao conectar com o banco de dados:', err);
  }
}

function render(){
  const list = document.getElementById('list');
  const results = document.getElementById('results');
  results.style.display = links.length ? 'block' : 'none';
  
  // Pega a URL base do Ngrok (remove o '/api' do final)
  const BASE_URL = API_URL.replace('/api', '');

  list.innerHTML = links.map(l => `
    <li class="link-item" data-code="${l.code}">
      <div class="link-info">
        <a class="short" href="${BASE_URL}/${l.code}" target="_blank" rel="noopener">
          ${l.short.startsWith('http') ? l.short : 'https://' + l.short}
        </a>
        <span class="original" title="${l.original}">${l.original}</span>
      </div>
      <div class="link-actions">
        <button class="btn-icon copy-btn">Copiar</button>
        <button class="btn-icon danger remove-btn">Remover</button>
      </div>
    </li>`).join('');

  // Ação do Botão Copiar (Copia o link REAL de internet que as pessoas podem acessar)
  list.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const li = e.target.closest('.link-item');
      const code = li.dataset.code;
      
      const linkPublicoReal = `${BASE_URL}/${code}`;
      
      navigator.clipboard.writeText(linkPublicoReal).then(() => {
        btn.textContent = 'Copiado!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1500);
      });
    });
  });

  // Ação do Botão Remover (Dispara chamada DELETE no banco)
  list.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const li = e.target.closest('.link-item');
      const code = li.dataset.code;
      
      try {
        const response = await fetch(`${API_URL}/shorten/${code}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          const idx = links.findIndex(l => l.code === code);
          links.splice(idx, 1);
          render();
        } else {
          alert('Erro ao deletar o link no servidor.');
        }
      } catch (err) {
        console.error('Erro de rede ao remover link:', err);
      }
    });
  });
}

// Envia os dados por POST para salvar na API
async function encurtar(){
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';
  const urlInput = document.getElementById('url');
  const aliasInput = document.getElementById('alias');
  const url = urlInput.value.trim();
  const custom_code = aliasInput.value.trim();

  if(!url){ errorEl.textContent = 'Cole um link para continuar.'; errorEl.style.display = 'block'; return; }
  if(!isValidUrl(url)){ errorEl.textContent = 'Digite uma URL válida (ex: https://exemplo.com).'; errorEl.style.display = 'block'; return; }

  try {
    const response = await fetch(`${API_URL}/shorten`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ original_url: url, custom_code })
    });

    const data = await response.json();

    if (!response.ok) {
      errorEl.textContent = data.error || 'Erro ao encurtar o link.';
      errorEl.style.display = 'block';
      return;
    }

    // Adiciona o link retornado pela API na lista
    links.unshift({ original: data.original, code: data.code, short: data.short });
    urlInput.value = ''; aliasInput.value = '';
    render();

  } catch (err) {
    errorEl.textContent = 'Não foi possível conectar ao servidor backend.';
    errorEl.style.display = 'block';
  }
}

document.getElementById('btn').addEventListener('click', encurtar);
document.getElementById('url').addEventListener('keyup', e => { if(e.key === 'Enter') encurtar(); });
document.getElementById('alias').addEventListener('keyup', e => { if(e.key === 'Enter') encurtar(); });

// Inicializa a listagem trazendo os dados persistidos no banco
carregarLinks();
</script>
